[env:esp32-32e]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

build_flags =
    -D USER_SETUP_LOADED=1
    -D ST7796_DRIVER=1
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=27
    -D TFT_BACKLIGHT_ON=HIGH
    -D SPI_FREQUENCY=80000000
    -D SPI_READ_FREQUENCY=20000000
    -D TOUCH_CS=33
    -D SPI_TOUCH_FREQUENCY=2500000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
